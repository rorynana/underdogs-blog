  <g stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1.5">
    <line x1="280" y1="149" x2="375" y2="255" marker-end="url(#arrBlue)"/>
    <line x1="280" y1="262" x2="375" y2="275" marker-end="url(#arrBlue)"/>
    <line x1="280" y1="355" x2="375" y2="295" marker-end="url(#arrBlue)"/>
    <line x1="280" y1="427" x2="375" y2="310" marker-end="url(#arrBlue)"/>
  </g>
