    <rect x="310" y="380" width="32" height="14" rx="3" fill="#4ADE80" fill-opacity="0.08" stroke="#4ADE80" stroke-opacity="0.18"/>
    <text x="326" y="390" text-anchor="middle" fill="#4ADE80">API</text>
