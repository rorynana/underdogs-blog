  <rect x="30" y="404" width="250" height="45" rx="10" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.13" filter="url(#glow)"/>
  <text x="155" y="432" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">GA4 + 뉴스 RSS</text>

