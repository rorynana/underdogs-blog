    <rect x="118" y="128" width="45" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="140" y="142" text-anchor="middle">쿠팡</text>
    <rect x="169" y="128" width="48" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="193" y="142" text-anchor="middle">네이버</text>
    <rect x="223" y="128" width="48" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="247" y="142" text-anchor="middle">카페24</text>
    <rect x="42" y="155" width="55" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="69" y="169" text-anchor="middle">올리브영</text>
    <rect x="103" y="155" width="55" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.05" stroke="#5B8CFF" stroke-opacity="0.08"/>
    <text x="130" y="169" text-anchor="middle" fill="#6B7BA0">+43 more</text>
  </g>

  <!-- 해외 채널 -->
  <rect x="30" y="218" width="250" height="88" rx="10" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.18" filter="url(#glow)"/>
  <text x="155" y="241" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">해외 채널</text>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#93b4ff">
