    <text x="700" y="374">GA4 / Market / News</text>
  </g>

  <!-- Circles for standby -->
  <g fill="#4A4F58" opacity="0.5">
    <circle cx="690" cy="352" r="2"/>
    <circle cx="690" cy="370" r="2"/>
  </g>

  <!-- Teams Webhook (repositioned: horizontal from backend bottom-right) -->
  <rect x="700" y="430" width="190" height="40" rx="8" fill="#1a1f2e" stroke="#5B8CFF" stroke-opacity="0.1" stroke-dasharray="4 3"/>
  <text x="795" y="455" text-anchor="middle" fill="#6B7080" font-family="Inter, system-ui, sans-serif" font-size="11">Teams Webhook 알림</text>

  <!-- Server → Teams (cleaner path: horizontal from server right side, then down) -->
  <path d="M 600,320 L 630,320 L 630,450 L 697,450" stroke="#5B8CFF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="5 4" fill="none" marker-end="url(#arrBlue)"/>

  <!-- Bottom credit -->
  <text x="480" y="548" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="10" opacity="0.3">SIGNAL  -  Business Intelligence Platform for K-Beauty</text>

  <rect x="0.5" y="0.5" width="959" height="579" stroke="#ffffff" stroke-opacity="0.03" fill="none"/>
</svg>