    <rect x="310" y="258" width="42" height="14" rx="3" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.18"/>
    <text x="331" y="268" text-anchor="middle" fill="#93b4ff">OAuth</text>

    <rect x="296" y="318" width="62" height="14" rx="3" fill="#FF5B5B" fill-opacity="0.08" stroke="#FF5B5B" stroke-opacity="0.18"/>
