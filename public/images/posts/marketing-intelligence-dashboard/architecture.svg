  <rect x="30" y="321" width="250" height="68" rx="10" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.18" filter="url(#glow)"/>
  <text x="155" y="344" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">광고 플랫폼</text>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#93b4ff">
