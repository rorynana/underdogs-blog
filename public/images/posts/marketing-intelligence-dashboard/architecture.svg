  <text x="630" y="270" text-anchor="middle" fill="#6B7080" font-family="JetBrains Mono, monospace" font-size="8">REST</text>

  <!-- === RIGHT: Frontend (balanced height) === -->
  <rect x="670" y="155" width="260" height="250" rx="14" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.2" filter="url(#glow)"/>
  <text x="800" y="182" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.08em">REACT DASHBOARD</text>
  <line x1="700" y1="194" x2="900" y2="194" stroke="#5B8CFF" stroke-opacity="0.08"/>

  <!-- Active tabs -->
  <text x="700" y="218" fill="#4ADE80" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="0.06em">ACTIVE</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fff" font-weight="500">
    <text x="700" y="240">Dashboard</text>
    <text x="700" y="260">Sales (국내+해외)</text>
    <text x="700" y="280">Ads (4 플랫폼)</text>
    <text x="700" y="300">Agent Chat</text>
  </g>

  <!-- Circles for active -->
  <g fill="#4ADE80" opacity="0.6">
    <circle cx="690" cy="236" r="2.5"/>
    <circle cx="690" cy="256" r="2.5"/>
    <circle cx="690" cy="276" r="2.5"/>
    <circle cx="690" cy="296" r="2.5"/>
  </g>

  <!-- Standby tabs -->
  <line x1="700" y1="316" x2="900" y2="316" stroke="#3A3F4B" stroke-opacity="0.3"/>
  <text x="700" y="336" fill="#6B7080" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="0.06em">STANDBY (6)</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4A4F58">
