    <text x="66" y="368" text-anchor="middle">Naver</text>
    <rect x="96" y="354" width="42" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="117" y="368" text-anchor="middle">Meta</text>
    <rect x="144" y="354" width="48" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="168" y="368" text-anchor="middle">쿠팡</text>
    <rect x="198" y="354" width="60" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="228" y="368" text-anchor="middle">Shopee</text>
