    <rect x="199" y="251" width="65" height="20" rx="4" fill="#5B8CFF" fill-opacity="0.07" stroke="#5B8CFF" stroke-opacity="0.12"/>
    <text x="231" y="265" text-anchor="middle">Amazon</text>
