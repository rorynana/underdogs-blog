  <text x="490" y="78" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.1em" opacity="0.6">BACKEND</text>
  <text x="800" y="78" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.1em" opacity="0.6">FRONTEND</text>

