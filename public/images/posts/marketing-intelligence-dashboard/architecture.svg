<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" fill="none">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="960" y2="580">
      <stop offset="0%" stop-color="#0d1017"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="orbGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5BFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8B5BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrBlue" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#5B8CFF" opacity="0.4"/>
    </marker>
    <marker id="arrBlueBold" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 8,3.5 0,7" fill="#5B8CFF" opacity="0.5"/>
    </marker>
    <marker id="arrPurple" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#8B5BFF" opacity="0.35"/>
    </marker>
  </defs>

  <rect width="960" height="580" fill="url(#archBg)"/>

  <!-- Orb glows -->
  <circle cx="480" cy="300" r="280" fill="url(#orbGlow1)"/>
  <circle cx="490" cy="480" r="180" fill="url(#orbGlow2)"/>

  <!-- Grid -->
  <g opacity="0.02" stroke="#5B8CFF" stroke-width="0.5">
    <line x1="0" y1="60" x2="960" y2="60"/><line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="180" x2="960" y2="180"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="300" x2="960" y2="300"/><line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="420" x2="960" y2="420"/><line x1="0" y1="480" x2="960" y2="480"/>
    <line x1="0" y1="540" x2="960" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="580"/><line x1="240" y1="0" x2="240" y2="580"/>
    <line x1="360" y1="0" x2="360" y2="580"/><line x1="480" y1="0" x2="480" y2="580"/>
    <line x1="600" y1="0" x2="600" y2="580"/><line x1="720" y1="0" x2="720" y2="580"/>
    <line x1="840" y1="0" x2="840" y2="580"/>
  </g>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em" opacity="0.9">SIGNAL ARCHITECTURE</text>
  <line x1="350" y1="50" x2="610" y2="50" stroke="#5B8CFF" stroke-width="1" opacity="0.25"/>

