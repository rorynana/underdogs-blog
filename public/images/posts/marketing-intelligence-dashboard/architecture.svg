  <text x="490" y="298" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="10">Scheduler (16 jobs/day)</text>
  <text x="490" y="328" text-anchor="middle" fill="#6B7080" font-family="JetBrains Mono, monospace" font-size="9">04:00 ~ 20:00 자동 수집</text>

  <!-- DB boxes -->
  <rect x="380" y="375" width="100" height="52" rx="8" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.15" filter="url(#glow)"/>
  <text x="430" y="397" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="9" font-weight="500">signal.db</text>
  <text x="430" y="414" text-anchor="middle" fill="#6B7080" font-family="Inter, system-ui, sans-serif" font-size="8">R/W</text>

  <rect x="500" y="375" width="100" height="52" rx="8" fill="url(#accentFade)" stroke="#5B8CFF" stroke-opacity="0.15" filter="url(#glow)"/>
  <text x="550" y="397" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="9" font-weight="500">prod.db</text>
  <text x="550" y="414" text-anchor="middle" fill="#6B7080" font-family="Inter, system-ui, sans-serif" font-size="8">ONE STOCK (RO)</text>

  <!-- Server → DB arrows -->
  <line x1="440" y1="340" x2="430" y2="372" stroke="#5B8CFF" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrBlue)"/>
  <line x1="540" y1="340" x2="550" y2="372" stroke="#5B8CFF" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrBlue)"/>

  <!-- Gemini AI -->
  <rect x="380" y="455" width="220" height="52" rx="10" fill="url(#accentFade)" stroke="#8B5BFF" stroke-opacity="0.2" filter="url(#glow)"/>
  <text x="490" y="479" text-anchor="middle" fill="#B89BFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.06em">GEMINI AI</text>
  <text x="490" y="497" text-anchor="middle" fill="#6B7080" font-family="JetBrains Mono, monospace" font-size="9">Pro / Flash hybrid</text>

  <!-- Server → Gemini -->
  <line x1="490" y1="427" x2="490" y2="452" stroke="#8B5BFF" stroke-opacity="0.25" stroke-width="1" marker-end="url(#arrPurple)"/>

  <!-- === ARROW: Backend → Frontend === -->
