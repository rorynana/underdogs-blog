<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080a10"/>
      <stop offset="50%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#3D6FE8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#5B8CFF" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="200" cy="150" r="200" fill="url(#orbGlow)"/>
  <circle cx="950" cy="450" r="250" fill="url(#orbGlow)"/>

  <!-- Center content area -->
  <!-- Factory icon -->
  <g transform="translate(440, 120)" opacity="0.9">
    <rect x="0" y="40" width="60" height="80" rx="4" fill="#5B8CFF" fill-opacity="0.1" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="10" y="55" width="15" height="12" rx="2" fill="#5B8CFF" fill-opacity="0.2"/>
    <rect x="35" y="55" width="15" height="12" rx="2" fill="#5B8CFF" fill-opacity="0.2"/>
    <rect x="10" y="80" width="15" height="12" rx="2" fill="#5B8CFF" fill-opacity="0.2"/>
    <rect x="35" y="80" width="15" height="12" rx="2" fill="#5B8CFF" fill-opacity="0.2"/>
    <!-- Chimney -->
    <rect x="8" y="15" width="12" height="25" rx="2" fill="#5B8CFF" fill-opacity="0.15" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="40" y="25" width="12" height="15" rx="2" fill="#5B8CFF" fill-opacity="0.15" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1"/>
  </g>

  <!-- Plus sign -->
  <text x="540" y="185" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="300" opacity="0.5">+</text>

  <!-- AI brain icon -->
  <g transform="translate(580, 130)" opacity="0.9">
    <circle cx="40" cy="45" r="38" fill="#5B8CFF" fill-opacity="0.06" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="40" y="58" text-anchor="middle" font-size="36">🧠</text>
  </g>

  <!-- Equals sign -->
  <text x="700" y="185" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="300" opacity="0.5">=</text>

  <!-- Rocket/Result icon -->
  <g transform="translate(730, 130)" opacity="0.9">
    <circle cx="40" cy="45" r="38" fill="#5B8CFF" fill-opacity="0.06" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="40" y="58" text-anchor="middle" font-size="36">🚀</text>
  </g>

  <!-- Main title -->
  <text x="600" y="300" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.03em">ONE STOCK</text>

  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" letter-spacing="0.02em">Production Intelligence Platform</text>

  <!-- Accent line -->
  <line x1="450" y1="370" x2="750" y2="370" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Stats row -->
  <g transform="translate(0, 400)">
    <!-- Stat 1 -->
    <text x="250" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">14일</text>
    <text x="250" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">개발 기간</text>

    <!-- Divider -->
    <line x1="400" y1="10" x2="400" y2="60" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="500" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">60명</text>
    <text x="500" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">전사 사용</text>

    <!-- Divider -->
    <line x1="650" y1="10" x2="650" y2="60" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="750" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">90%↓</text>
    <text x="750" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">재고 문의 감소</text>

    <!-- Divider -->
    <line x1="900" y1="10" x2="900" y2="60" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Stat 4 -->
    <text x="1000" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">0.8초</text>
    <text x="1000" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400">Teams 봇 응답</text>
  </g>

  <!-- Tech stack badges -->
  <g transform="translate(340, 500)">
    <rect x="0" y="0" width="65" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="32" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">React</text>

    <rect x="75" y="0" width="90" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="120" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">TypeScript</text>

    <rect x="175" y="0" width="55" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="202" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">MCP</text>

    <rect x="240" y="0" width="75" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="277" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">Express</text>

    <rect x="325" y="0" width="65" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="357" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">SQLite</text>

    <rect x="400" y="0" width="90" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="445" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">Ecount ERP</text>
  </g>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" fill="none"/>
</svg>
