<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#080a10"/>
      <stop offset="50%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#3D6FE8"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#5B8CFF" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <circle cx="280" cy="200" r="200" fill="url(#orbGlow)"/>
  <circle cx="920" cy="430" r="220" fill="url(#orbGlow2)"/>

  <!-- Icons row: YT + TS + Chrome = Score -->
  <g transform="translate(300, 95)">
    <circle cx="40" cy="45" r="38" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- YouTube play icon -->
    <polygon points="32,35 32,55 52,45" fill="#FF4444" opacity="0.8"/>
  </g>
  <text x="390" y="150" text-anchor="middle" fill="#5B8CFF" font-size="28" opacity="0.4">+</text>
  <g transform="translate(420, 95)">
    <circle cx="40" cy="45" r="38" fill="#3178C6" fill-opacity="0.06" stroke="#3178C6" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="40" y="55" text-anchor="middle" font-size="26" fill="#3178C6" font-family="JetBrains Mono, monospace" font-weight="700">TS</text>
  </g>
  <text x="510" y="150" text-anchor="middle" fill="#5B8CFF" font-size="28" opacity="0.4">+</text>
  <g transform="translate(540, 95)">
    <circle cx="40" cy="45" r="38" fill="#4ADE80" fill-opacity="0.06" stroke="#4ADE80" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Chrome icon simplified -->
    <circle cx="40" cy="45" r="14" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.8"/>
    <circle cx="40" cy="45" r="6" fill="#4ADE80" opacity="0.6"/>
  </g>
  <text x="630" y="150" text-anchor="middle" fill="#5B8CFF" font-size="28" opacity="0.4">=</text>
  <g transform="translate(660, 95)">
    <circle cx="40" cy="45" r="38" fill="#5B8CFF" fill-opacity="0.06" stroke="#5B8CFF" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="40" y="55" text-anchor="middle" font-size="26" fill="#5B8CFF" font-family="JetBrains Mono, monospace" font-weight="800">78</text>
  </g>

  <!-- Title -->
  <text x="600" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" letter-spacing="-0.02em">TubeScout</text>
  <text x="600" y="310" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="400">YouTube Creator Scoring in 3 Seconds</text>

  <line x1="420" y1="335" x2="780" y2="335" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Scoring indicators -->
  <g transform="translate(0, 365)">
    <text x="200" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">VPS</text>
    <text x="200" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13">50%</text>

    <line x1="320" y1="10" x2="320" y2="60" stroke="#ffffff" stroke-opacity="0.06"/>

    <text x="440" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">Cadence</text>
    <text x="440" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13">30%</text>

    <line x1="570" y1="10" x2="570" y2="60" stroke="#ffffff" stroke-opacity="0.06"/>

    <text x="690" y="30" text-anchor="middle" fill="#4ADE80" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">Momentum</text>
    <text x="690" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13">20%</text>

    <line x1="820" y1="10" x2="820" y2="60" stroke="#ffffff" stroke-opacity="0.06"/>

    <text x="940" y="30" text-anchor="middle" fill="#5B8CFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">3sec</text>
    <text x="940" y="55" text-anchor="middle" fill="#8A8F98" font-family="Inter, system-ui, sans-serif" font-size="13">SLA</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(300, 465)">
    <rect x="0" y="0" width="85" height="26" rx="6" fill="#3178C6" fill-opacity="0.08" stroke="#3178C6" stroke-opacity="0.15"/>
    <text x="42" y="17" text-anchor="middle" fill="#3178C6" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">TypeScript</text>
    <rect x="95" y="0" width="95" height="26" rx="6" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-opacity="0.15"/>
    <text x="142" y="17" text-anchor="middle" fill="#FF6666" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">YouTube API</text>
    <rect x="200" y="0" width="90" height="26" rx="6" fill="#4ADE80" fill-opacity="0.08" stroke="#4ADE80" stroke-opacity="0.15"/>
    <text x="245" y="17" text-anchor="middle" fill="#4ADE80" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">Chrome MV3</text>
    <rect x="300" y="0" width="100" height="26" rx="6" fill="#5B8CFF" fill-opacity="0.08" stroke="#5B8CFF" stroke-opacity="0.15"/>
    <text x="350" y="17" text-anchor="middle" fill="#93b4ff" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500">3-Indicator</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="629" stroke="#ffffff" stroke-opacity="0.04" fill="none"/>
</svg>