<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>favicon preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0B0F;
      color: white;
      font-family: 'Courier New', monospace;
      padding: 56px;
      min-height: 100vh;
    }
    .header {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: #8A8F98;
      margin-bottom: 52px;
      text-transform: uppercase;
    }
    .grid { display: flex; gap: 64px; flex-wrap: wrap; align-items: flex-start; }
    .card { display: flex; flex-direction: column; gap: 20px; }
    .card-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #5B8CFF;
      text-transform: uppercase;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0F1115;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px 7px 0 0;
      padding: 7px 16px 7px 12px;
      border-bottom: none;
    }
    .tab-text { font-size: 12px; color: #8A8F98; font-family: system-ui, sans-serif; }
    .tab-bar {
      background: rgba(255,255,255,0.06);
      height: 1px;
      width: 220px;
    }
    .sizes { display: flex; gap: 20px; align-items: flex-end; margin-top: 4px; }
    .size-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .size-label { font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 0.1em; }
    svg { image-rendering: pixelated; display: block; }
  </style>
</head>
<body>

  <p class="header">// favicon options — the underdogs</p>

  <!-- SVG symbol defs -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">

    <!-- [ 01 ] U — 픽셀 이니셜 -->
    <symbol id="fav-u" viewBox="0 0 32 32">
      <rect width="32" height="32" fill="#0F1115"/>
      <!-- U shape: 5cols × 6rows, 4px/pixel, offset x=6 y=4 -->
      <!-- col 0 -->
      <rect x="6"  y="4"  width="4" height="4" fill="#5B8CFF"/>
      <rect x="6"  y="8"  width="4" height="4" fill="#5B8CFF"/>
      <rect x="6"  y="12" width="4" height="4" fill="#5B8CFF"/>
      <rect x="6"  y="16" width="4" height="4" fill="#5B8CFF"/>
      <rect x="6"  y="20" width="4" height="4" fill="#5B8CFF"/>
      <!-- col 4 -->
      <rect x="22" y="4"  width="4" height="4" fill="#5B8CFF"/>
      <rect x="22" y="8"  width="4" height="4" fill="#5B8CFF"/>
      <rect x="22" y="12" width="4" height="4" fill="#5B8CFF"/>
      <rect x="22" y="16" width="4" height="4" fill="#5B8CFF"/>
      <rect x="22" y="20" width="4" height="4" fill="#5B8CFF"/>
      <!-- bottom row -->
      <rect x="10" y="20" width="4" height="4" fill="#5B8CFF"/>
      <rect x="18" y="20" width="4" height="4" fill="#5B8CFF"/>
      <rect x="10" y="24" width="4" height="4" fill="#5B8CFF"/>
      <rect x="14" y="24" width="4" height="4" fill="#5B8CFF"/>
      <rect x="18" y="24" width="4" height="4" fill="#5B8CFF"/>
    </symbol>

    <!-- [ 02 ] Pixel — operator face (6×4 dot art) -->
    <symbol id="fav-pixel" viewBox="0 0 32 32">
      <rect width="32" height="32" fill="#0F1115"/>
      <!-- Row 0: hair (hhhhhh) — 5px/pixel, offset x=1 y=6 -->
      <rect x="1"  y="6"  width="5" height="5" fill="#3B1F0E"/>
      <rect x="6"  y="6"  width="5" height="5" fill="#3B1F0E"/>
      <rect x="11" y="6"  width="5" height="5" fill="#3B1F0E"/>
      <rect x="16" y="6"  width="5" height="5" fill="#3B1F0E"/>
      <rect x="21" y="6"  width="5" height="5" fill="#3B1F0E"/>
      <rect x="26" y="6"  width="5" height="5" fill="#3B1F0E"/>
      <!-- Row 1: face (hssssh) -->
      <rect x="1"  y="11" width="5" height="5" fill="#3B1F0E"/>
      <rect x="6"  y="11" width="5" height="5" fill="#FBBF24"/>
      <rect x="11" y="11" width="5" height="5" fill="#FBBF24"/>
      <rect x="16" y="11" width="5" height="5" fill="#FBBF24"/>
      <rect x="21" y="11" width="5" height="5" fill="#FBBF24"/>
      <rect x="26" y="11" width="5" height="5" fill="#3B1F0E"/>
      <!-- Row 2: eyes (heeeeh) — red eyes for visibility -->
      <rect x="1"  y="16" width="5" height="5" fill="#3B1F0E"/>
      <rect x="6"  y="16" width="5" height="5" fill="#5B8CFF"/>
      <rect x="11" y="16" width="5" height="5" fill="#FBBF24"/>
      <rect x="16" y="16" width="5" height="5" fill="#FBBF24"/>
      <rect x="21" y="16" width="5" height="5" fill="#5B8CFF"/>
      <rect x="26" y="16" width="5" height="5" fill="#3B1F0E"/>
      <!-- Row 3: face (hssssh) -->
      <rect x="1"  y="21" width="5" height="5" fill="#3B1F0E"/>
      <rect x="6"  y="21" width="5" height="5" fill="#FBBF24"/>
      <rect x="11" y="21" width="5" height="5" fill="#FBBF24"/>
      <rect x="16" y="21" width="5" height="5" fill="#FBBF24"/>
      <rect x="21" y="21" width="5" height="5" fill="#FBBF24"/>
      <rect x="26" y="21" width="5" height="5" fill="#3B1F0E"/>
    </symbol>

    <!-- [ 03 ] JSY — operator codename -->
    <symbol id="fav-jsy" viewBox="0 0 32 32">
      <rect width="32" height="32" fill="#0F1115"/>
      <!-- border frame -->
      <rect x="1" y="1" width="30" height="1"  fill="#5B8CFF" opacity="0.4"/>
      <rect x="1" y="30" width="30" height="1" fill="#5B8CFF" opacity="0.4"/>
      <rect x="1" y="1" width="1"  height="30" fill="#5B8CFF" opacity="0.4"/>
      <rect x="30" y="1" width="1" height="30" fill="#5B8CFF" opacity="0.4"/>
      <!-- JSY text (monospace, pixel-rendered via SVG text) -->
      <text x="16" y="21" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="900"
        font-size="12"
        letter-spacing="1"
        fill="#5B8CFF">JSY</text>
    </symbol>

    <!-- [ 04 ] > — terminal prompt pixel -->
    <symbol id="fav-prompt" viewBox="0 0 32 32">
      <rect width="32" height="32" fill="#0F1115"/>
      <!-- > shape: 5×5, 4px/pixel, offset x=6 y=6 -->
      <!-- row 0: X X . . . -->
      <rect x="6"  y="6"  width="4" height="4" fill="#4ADE80"/>
      <rect x="10" y="6"  width="4" height="4" fill="#4ADE80"/>
      <!-- row 1: . . X X . -->
      <rect x="14" y="10" width="4" height="4" fill="#4ADE80"/>
      <rect x="18" y="10" width="4" height="4" fill="#4ADE80"/>
      <!-- row 2: . . . . X -->
      <rect x="22" y="14" width="4" height="4" fill="#4ADE80"/>
      <!-- row 3: . . X X . -->
      <rect x="14" y="18" width="4" height="4" fill="#4ADE80"/>
      <rect x="18" y="18" width="4" height="4" fill="#4ADE80"/>
      <!-- row 4: X X . . . -->
      <rect x="6"  y="22" width="4" height="4" fill="#4ADE80"/>
      <rect x="10" y="22" width="4" height="4" fill="#4ADE80"/>
    </symbol>

  </svg>

  <div class="grid">

    <!-- Option 1: U -->
    <div class="card">
      <span class="card-label">[ 01 ] &nbsp; U — underdogs initial</span>
      <div>
        <div class="tab">
          <svg width="16" height="16"><use href="#fav-u"/></svg>
          <span class="tab-text">The Underdogs</span>
        </div>
        <div class="tab-bar"></div>
      </div>
      <div class="sizes">
        <div class="size-wrap">
          <svg width="16" height="16"><use href="#fav-u"/></svg>
          <span class="size-label">16px</span>
        </div>
        <div class="size-wrap">
          <svg width="32" height="32"><use href="#fav-u"/></svg>
          <span class="size-label">32px</span>
        </div>
        <div class="size-wrap">
          <svg width="64" height="64"><use href="#fav-u"/></svg>
          <span class="size-label">64px</span>
        </div>
      </div>
    </div>

    <!-- Option 2: Pixel -->
    <div class="card">
      <span class="card-label">[ 02 ] &nbsp; pixel — operator face</span>
      <div>
        <div class="tab">
          <svg width="16" height="16"><use href="#fav-pixel"/></svg>
          <span class="tab-text">The Underdogs</span>
        </div>
        <div class="tab-bar"></div>
      </div>
      <div class="sizes">
        <div class="size-wrap">
          <svg width="16" height="16"><use href="#fav-pixel"/></svg>
          <span class="size-label">16px</span>
        </div>
        <div class="size-wrap">
          <svg width="32" height="32"><use href="#fav-pixel"/></svg>
          <span class="size-label">32px</span>
        </div>
        <div class="size-wrap">
          <svg width="64" height="64"><use href="#fav-pixel"/></svg>
          <span class="size-label">64px</span>
        </div>
      </div>
    </div>

    <!-- Option 3: JSY -->
    <div class="card">
      <span class="card-label">[ 03 ] &nbsp; JSY — operator codename</span>
      <div>
        <div class="tab">
          <svg width="16" height="16"><use href="#fav-jsy"/></svg>
          <span class="tab-text">The Underdogs</span>
        </div>
        <div class="tab-bar"></div>
      </div>
      <div class="sizes">
        <div class="size-wrap">
          <svg width="16" height="16"><use href="#fav-jsy"/></svg>
          <span class="size-label">16px</span>
        </div>
        <div class="size-wrap">
          <svg width="32" height="32"><use href="#fav-jsy"/></svg>
          <span class="size-label">32px</span>
        </div>
        <div class="size-wrap">
          <svg width="64" height="64"><use href="#fav-jsy"/></svg>
          <span class="size-label">64px</span>
        </div>
      </div>
    </div>

    <!-- Option 4: > -->
    <div class="card">
      <span class="card-label">[ 04 ] &nbsp; &gt; — terminal prompt</span>
      <div>
        <div class="tab">
          <svg width="16" height="16"><use href="#fav-prompt"/></svg>
          <span class="tab-text">The Underdogs</span>
        </div>
        <div class="tab-bar"></div>
      </div>
      <div class="sizes">
        <div class="size-wrap">
          <svg width="16" height="16"><use href="#fav-prompt"/></svg>
          <span class="size-label">16px</span>
        </div>
        <div class="size-wrap">
          <svg width="32" height="32"><use href="#fav-prompt"/></svg>
          <span class="size-label">32px</span>
        </div>
        <div class="size-wrap">
          <svg width="64" height="64"><use href="#fav-prompt"/></svg>
          <span class="size-label">64px</span>
        </div>
      </div>
    </div>

  </div>


</body>
</html>
